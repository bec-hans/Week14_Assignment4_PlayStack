<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayStack | Game Backlog Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Questrial&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-left">
        <div class="logo-wrap" aria-label="PlayStack brand">
          <div class="logo-mark" aria-hidden="true"></div>
          <p class="eyebrow">Game Log Tracker</p>
          <h1>PlayStack</h1>
        </div>
        <button
          type="button"
          id="open-add-game"
          class="btn btn-solid header-add-btn"
          aria-haspopup="dialog"
          aria-controls="add-game-modal"
          aria-expanded="false"
        >
          Add a Game
        </button>
      </div>
      <nav class="top-nav" aria-label="Primary navigation">
        <a class="nav-link active" href="./index.html">Library</a>
        <a class="nav-link" href="./tier.html">Tier List</a>
      </nav>
    </header>

    <main>
      <section class="panel controls-panel" aria-label="Search and filter games">
        <div class="section-title-wrap">
          <h2>Search & Filter</h2>
          <p class="muted">Find the right game instantly.</p>
        </div>
        <div class="controls-grid">
          <label>
            <span>Search</span>
            <input id="search-input" type="text" placeholder="Search title..." />
          </label>
          <label>
            <span>Sort By</span>
            <select id="sort-select">
              <option value="recent">Recently Added</option>
              <option value="rating">User Rating</option>
              <option value="alphabetical">Alphabetical</option>
            </select>
          </label>
          <label>
            <span>Genre</span>
            <select id="genre-filter">
              <option value="all">All Genres</option>
            </select>
          </label>
        </div>
      </section>

      <section class="board" aria-label="Game status categories">
        <article class="status-column panel">
          <div class="status-head">
            <h3>Wishlist</h3>
            <span id="wishlist-count">0</span>
          </div>
          <div id="wishlist-list" class="game-list" aria-label="Wishlist games"></div>
        </article>
        <article class="status-column panel">
          <div class="status-head">
            <h3>Playing</h3>
            <span id="playing-count">0</span>
          </div>
          <div id="playing-list" class="game-list" aria-label="Playing games"></div>
        </article>
        <article class="status-column panel">
          <div class="status-head">
            <h3>Completed</h3>
            <span id="completed-count">0</span>
          </div>
          <div id="completed-list" class="game-list" aria-label="Completed games"></div>
        </article>
      </section>
    </main>

    <dialog id="add-game-modal" class="game-modal add-game-modal" aria-labelledby="add-game-heading" aria-modal="true">
      <div class="modal-close-wrap">
        <button type="button" class="btn btn-ghost" id="add-game-close-x" aria-label="Close add game dialog">
          Close
        </button>
      </div>
      <h2 id="add-game-heading" class="add-modal-title">Add a Game</h2>
      <form id="add-game-form" class="add-game-form" aria-label="Add game form" novalidate>
        <label>
          <span>Game Title</span>
          <input
            id="add-game-title"
            name="title"
            type="text"
            placeholder="Type title..."
            autocomplete="off"
            required
          />
        </label>
        <ul id="suggestions-list" class="suggestions" aria-label="Game suggestions from RAWG"></ul>
        <label>
          <span>Platform</span>
          <input
            id="add-game-platform"
            name="platform"
            type="text"
            placeholder="PC, PS5, Switch..."
            required
          />
        </label>
        <label>
          <span>Status</span>
          <select id="add-game-status" name="status" aria-label="Game status">
            <option value="Wishlist">Wishlist</option>
            <option value="Playing">Playing</option>
            <option value="Completed">Completed</option>
          </select>
        </label>
        <div class="star-rating-field">
          <span>User Rating</span>
          <p class="muted star-rating-hint">Optional — click a star (1–5).</p>
          <input type="hidden" id="add-game-user-rating-value" name="userRating" value="" />
          <div
            id="add-game-star-group"
            class="star-rating"
            role="radiogroup"
            aria-label="User rating from 1 to 5 stars"
            data-star-hidden="add-game-user-rating-value"
          >
            <button type="button" class="star-rating-btn" data-star-rating-btn data-star-value="1" aria-label="1 out of 5 stars" aria-pressed="false">★</button>
            <button type="button" class="star-rating-btn" data-star-rating-btn data-star-value="2" aria-label="2 out of 5 stars" aria-pressed="false">★</button>
            <button type="button" class="star-rating-btn" data-star-rating-btn data-star-value="3" aria-label="3 out of 5 stars" aria-pressed="false">★</button>
            <button type="button" class="star-rating-btn" data-star-rating-btn data-star-value="4" aria-label="4 out of 5 stars" aria-pressed="false">★</button>
            <button type="button" class="star-rating-btn" data-star-rating-btn data-star-value="5" aria-label="5 out of 5 stars" aria-pressed="false">★</button>
          </div>
        </div>
        <label>
          <span>Notes</span>
          <textarea id="add-game-notes" name="notes" rows="4" placeholder="Personal notes or mini-review..."></textarea>
        </label>
        <label class="checkbox-label">
          <input id="add-game-tier-checkbox" type="checkbox" name="addToTier" />
          <span>Add to Tier List</span>
        </label>
        <div id="add-game-tier-panel" class="tier-radio-panel" hidden>
          <fieldset id="add-game-tier-fieldset" class="tier-radio-fieldset" disabled aria-describedby="add-tier-hint">
            <legend class="tier-radio-legend">Tier level</legend>
            <div class="tier-radio-grid" role="presentation">
              <label class="tier-radio-option">
                <input type="radio" name="add-game-tier" value="S" />
                <span>S</span>
              </label>
              <label class="tier-radio-option">
                <input type="radio" name="add-game-tier" value="A" />
                <span>A</span>
              </label>
              <label class="tier-radio-option">
                <input type="radio" name="add-game-tier" value="B" />
                <span>B</span>
              </label>
              <label class="tier-radio-option">
                <input type="radio" name="add-game-tier" value="C" />
                <span>C</span>
              </label>
              <label class="tier-radio-option">
                <input type="radio" name="add-game-tier" value="D" />
                <span>D</span>
              </label>
              <label class="tier-radio-option">
                <input type="radio" name="add-game-tier" value="None" checked />
                <span>None</span>
              </label>
            </div>
          </fieldset>
        </div>
        <p id="add-tier-hint" class="muted add-tier-hint">
          When checked, choose which tier row the game starts in on the tier list page.
        </p>
        <div class="add-game-actions">
          <button type="submit" class="btn btn-solid">Add Game</button>
          <button type="button" class="btn" id="add-game-cancel">Cancel</button>
        </div>
      </form>
    </dialog>

    <dialog id="game-modal" class="game-modal" aria-labelledby="modal-title">
      <form method="dialog" class="modal-close-wrap">
        <button class="btn btn-ghost" aria-label="Close game detail view">Close</button>
      </form>
      <section id="modal-body"></section>
    </dialog>

      };
    </script>
    <script src="./app.js"></script>
  </body>
</html>
